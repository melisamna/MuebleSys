<div >
  <div *ngIf="datos">
    <img [src]="datos.picture || datos.foto" alt="Perfil"
    (error)="onImgError($event)">
    <span>Bienvenido, 
      <strong>
        {{ datos.name || datos.nombre || datos.displayName || 'Usuario' }}
      </strong>
    </span>
  </div>
  
  <button (click)="onLogout()">Cerrar Sesión</button>
</div>
